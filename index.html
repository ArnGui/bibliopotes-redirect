<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BiblioPotes — Rejoindre un groupe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #3d4a38;
      color: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
    }
    .emoji { font-size: 52px; margin-bottom: 20px; display: block; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #f5f0e8; }
    .group { font-size: 15px; color: #c4992a; font-style: italic; margin-bottom: 24px; }
    .status { font-size: 14px; color: #8aaa7e; margin-bottom: 28px; min-height: 20px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
    }
    .btn-primary { background: #c47c3a; color: #fff; }
    .btn-secondary {
      background: transparent;
      color: #8aaa7e;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
    }
    .footer { margin-top: 28px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">📚</span>
    <h1>Tu as été invité sur BiblioPotes</h1>
    <p class="group" id="groupLabel">Chargement...</p>
    <p class="status" id="status">Ouverture de l'application...</p>
    <a class="btn btn-primary" id="storeBtn" href="#" style="display:none">
      Télécharger BiblioPotes
    </a>
    <a class="btn btn-secondary" id="openBtn" href="#" style="display:none">
      Ouvrir dans l'app
    </a>
    <div class="footer">BiblioPotes · La bibliothèque de tes potes</div>
  </div>

  <script>
    const PLAY_STORE  = 'https://play.google.com/store/apps/details?id=com.arnaud.BiblioPotes'
    const APP_STORE   = 'https://apps.apple.com/app/bibliopotes/id000000000' // à remplacer après publication iOS
    const params      = new URLSearchParams(window.location.search)
    const code        = params.get('code') || ''

    // Détecter l'OS
    const ua       = navigator.userAgent || ''
    const isIOS    = /iphone|ipad|ipod/i.test(ua)
    const isAndroid = /android/i.test(ua)
    const storeUrl = isIOS ? APP_STORE : PLAY_STORE

    // Afficher le code dans le label
    document.getElementById('groupLabel').textContent =
      code ? 'Code d\'invitation : ' + code : 'Rejoins le groupe de ton ami'

    // Deep link universel — Android l'intercepte via intentFilters autoVerify
    // iOS l'intercepte via Universal Links (nécessite apple-app-site-association)
    const universalLink = 'https://arngui.github.io/bibliopotes-redirect/?code=' + code

    // Fallback : scheme custom
    const deepLink = code ? 'bibliopotes://invite?code=' + code : 'bibliopotes://'

    const storeBtnEl = document.getElementById('storeBtn')
    const openBtnEl  = document.getElementById('openBtn')
    const statusEl   = document.getElementById('status')

    storeBtnEl.href = storeUrl

    // Stratégie : tenter le deep link, après 2.5s afficher le bouton store
    function tryOpenApp() {
      statusEl.textContent = 'Tentative d\'ouverture de l\'app...'

      // On tente le scheme custom — plus fiable que le lien universel pour Android non vérifié
      const iframe = document.createElement('iframe')
      iframe.style.display = 'none'
      iframe.src = deepLink
      document.body.appendChild(iframe)

      // Aussi tenter window.location pour iOS
      setTimeout(() => { window.location = deepLink }, 100)

      // Si l'app ne s'est pas ouverte après 2.5s → afficher les boutons
      setTimeout(() => {
        statusEl.textContent = 'L\'app ne semble pas installée.'
        storeBtnEl.style.display = 'block'
        openBtnEl.style.display  = 'block'
        openBtnEl.href = deepLink
        openBtnEl.textContent = 'Réessayer d\'ouvrir l\'app'
      }, 2500)
    }

    // Lancer dès que la page est prête
    if (isIOS || isAndroid) {
      tryOpenApp()
    } else {
      // Desktop — afficher directement les boutons store
      statusEl.textContent = 'Ouvre cette page sur ton téléphone pour rejoindre le groupe.'
      storeBtnEl.style.display = 'block'
      storeBtnEl.textContent   = 'Voir sur le Play Store'
    }
  </script>
</body>
</html>
