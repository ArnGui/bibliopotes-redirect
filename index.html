<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BiblioPotes</title>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search)
  const code = params.get('code')

  const deepLink = code
    ? `bibliopotes://invite?code=${code}`
    : `bibliopotes://`

  window.location = deepLink

  setTimeout(() => {
    window.location = 'https://play.google.com/store/apps/details?id=com.arnaud.BiblioPotes'
  }, 2000)
</script>
<p>Ouverture de BiblioPotes...</p>
</body>
</html>
